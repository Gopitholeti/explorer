<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eXplorer</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --accent: #FF6B6B; --panel: rgba(255,255,255,0.98); }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Auth Screen */
        #auth-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        input { padding: 15px; border-radius: 12px; border: 1px solid #ddd; width: 85%; max-width: 320px; margin: 10px 0; font-size: 16px; outline: none; }
        
        .ui-panel {
            position: absolute; bottom: 35px; left: 15px; right: 15px;
            z-index: 1000; background: var(--panel); padding: 18px;
            border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex; justify-content: space-between; align-items: center;
            max-width: 420px; margin: auto; backdrop-filter: blur(10px);
        }

        .custom-pin {
            width: 24px; height: 24px; background: var(--accent);
            border: 2px solid white; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .btn { border: none; border-radius: 14px; padding: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; width: 100%; max-width: 320px; font-size: 1rem; }
        .btn-gps { background: #007AFF; color: white; width: 44px; height: 44px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-logout { background: #eee; color: #666; font-size: 0.8rem; padding: 8px 12px; }

        .popup-container { padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="font-size: 2.5rem; margin-bottom: 0;">📍 eXplorer</h1>
        <p style="color: #666; margin-bottom: 20px;">Your Australian Journey, Synced.</p>
        <input type="email" id="email" placeholder="Enter your email">
        <button class="btn btn-main" onclick="handleLogin()">Get Magic Link</button>
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">We'll email you a login link.</p>
    </div>

    <div id="map"></div>

    <div class="ui-panel" id="main-ui" style="display:none;">
        <div>
            <h3 style="margin:0; letter-spacing: -0.5px;">eXplorer</h3>
            <p id="counter" style="margin:0; font-size:0.8rem; color:#888;">Updating...</p>
        </div>
        <div style="display:flex; gap:10px; align-items: center;">
            <button class="btn btn-gps" onclick="centerOnMe()">🧭</button>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = 'https://cluzafvesdirdddttfnd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsdXphZnZlc2RpcmRkZHR0Zm5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzQ1NzAsImV4cCI6MjA4OTQ1MDU3MH0.pVEyx2Jq-j2MZAncrauPs58EowcbvE7ueFCbBDWEOHY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = null;
        let markers = L.layerGroup();

        // --- MAP SETUP ---
        const map = L.map('map', { zoomControl: false }).setView([-25.27, 133.77], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { detectRetina: true }).addTo(map);
        markers.addTo(map);

        // --- AUTH ---
        async function handleLogin() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Please enter an email!");
            const { error } = await supabase.auth.signInWithOtp({ email });
            if (error) alert(error.message);
            else alert("Success! Check your inbox for the login link.");
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                loadAdventures();
            }
        });

        // --- DATA OPS ---
        async function loadAdventures() {
            markers.clearLayers();
            const { data, error } = await supabase
                .from('adventures')
                .select('*')
                .eq('user_id', user.id);
            
            if (data) {
                data.forEach(p => renderMarker(p));
                updateCounter(data.length);
            }
        }

        map.on('click', async (e) => {
            if (!user) return;
            const name = prompt("What did you find here?");
            if (!name) return;

            const newEntry = {
                name: name,
                latlng: { lat: e.latlng.lat, lng: e.latlng.lng },
                user_id: user.id
            };

            const { data, error } = await supabase.from('adventures').insert([newEntry]).select();
            if (error) {
                console.error(error);
                alert("Error saving! Check your RLS policies.");
            } else {
                loadAdventures(); 
            }
        });

        function renderMarker(place) {
            const icon = L.divIcon({ className: 'custom-pin', iconSize: [24, 24], iconAnchor: [12, 24] });
            const m = L.marker([place.latlng.lat, place.latlng.lng], { icon }).addTo(markers);
            m.bindPopup(`<div class="popup-container"><strong>${place.name}</strong><br><small>${new Date(place.created_at).toLocaleDateString('en-AU')}</small></div>`);
        }

        function updateCounter(count) {
            document.getElementById('counter').innerText = `${count} adventures synced`;
        }

        function centerOnMe() {
            map.locate({setView: true, maxZoom: 14});
        }
    </script>
</body>
</html>
