<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oz Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/esri-leaflet-geocoder@3.1.4/dist/esri-leaflet-geocoder.css">
    
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #333; 
            --panel: #ffffff; 
            --accent: #FF6B6B; /* Soft Coral accent */
        }
        body.dark-mode { 
            --bg: #121212; 
            --text: #f0f0f0; 
            --panel: #1e1e1e; 
            --accent: #FF8787; 
        }

        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Custom Marker Style (Replaces Blue Pins) */
        .custom-pin {
            width: 30px;
            height: 30px;
            background-color: var(--accent);
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .custom-pin::after {
            content: '';
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        /* UI Elements */
        .ui-panel {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            z-index: 1000; background: var(--panel); padding: 15px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
            max-width: 400px; margin: auto;
        }

        .btn { border: none; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-mode { background: #444; color: white; width: 40px; height: 40px; font-size: 1.2rem; }
        
        .popup-container { min-width: 180px; text-align: center; color: #333; }
        .visit-date { font-size: 0.75rem; color: #777; margin-bottom: 8px; display: block; }
        .popup-img { width: 100%; border-radius: 10px; margin: 10px 0; max-height: 150px; object-fit: cover; }
        .btn-delete { background: #ff3b30; color: white; font-size: 0.7rem; margin-top: 8px; width: 100%; }
        .btn-photo { background: var(--accent); color: white; font-size: 0.7rem; width: 100%; }
        
        #file-input { display: none; }

        /* Search Bar Color Polish */
        .geocoder-control-input { border-radius: 20px !important; }
    </style>
</head>
<body class="light-mode">

    <div id="map"></div>
    <input type="file" id="file-input" accept="image/*">

    <div class="ui-panel">
        <div class="stats">
            <h3 style="margin:0; font-size: 1rem;">🇦🇺 Oz Tracker</h3>
            <p id="counter" style="margin:2px 0 0; font-size: 0.8rem; color: #888;">0 places explored</p>
        </div>
        <button class="btn btn-mode" onclick="toggleDarkMode()" id="mode-btn">🌙</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet-geocoder@3.1.4/dist/esri-leaflet-geocoder.js"></script>

    <script>
        let isDarkMode = localStorage.getItem('dark-mode') === 'true';
        let places = JSON.parse(localStorage.getItem('myPlaces') || '[]');
        let activeMarkers = {};

        // Initialize Map
        const map = L.map('map', { zoomControl: false }).setView([-25.27, 133.77], 4);
        
        // Premium Map Tiles (Voyager for Light, DarkMatter for Dark)
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

        function updateTheme() {
            if (isDarkMode) { 
                map.removeLayer(lightTiles); darkTiles.addTo(map); 
                document.body.className='dark-mode'; document.getElementById('mode-btn').innerText='☀️'; 
            } else { 
                map.removeLayer(darkTiles); lightTiles.addTo(map); 
                document.body.className='light-mode'; document.getElementById('mode-btn').innerText='🌙'; 
            }
        }
        updateTheme();

        function toggleDarkMode() { 
            isDarkMode = !isDarkMode; 
            localStorage.setItem('dark-mode', isDarkMode); 
            updateTheme(); 
            location.reload(); // Refresh to update marker colors in CSS
        }

        // Search Tool
        const searchControl = L.esri.Geocoding.geosearch({
            placeholder: 'Find a place...',
            providers: [L.esri.Geocoding.arcgisOnlineProvider({ countries: ['AUS'] })]
        }).addTo(map);

        searchControl.on('results', (data) => { if (data.results.length > 0) createPlace(data.results[0].text, data.results[0].latlng); });
        map.on('click', (e) => { const n = prompt("What's this spot called?"); if (n) createPlace(n, e.latlng); });

        function getAESTDate() {
            return new Intl.DateTimeFormat('en-AU', {
                timeZone: 'Australia/Sydney',
                dateStyle: 'medium',
                timeStyle: 'short'
            }).format(new Date());
        }

        function createPlace(name, latlng) {
            const id = Date.now().toString();
            const newPlace = { id, name, latlng, img: null, date: getAESTDate() };
            places.push(newPlace);
            renderMarker(newPlace);
            save();
        }

        function renderMarker(place) {
            // Create the Custom Colored Pin
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class='custom-pin'></div>`,
                iconSize: [30, 42],
                iconAnchor: [15, 42]
            });

            const marker = L.marker(place.latlng, { icon: customIcon }).addTo(map);
            activeMarkers[place.id] = marker;
            
            const div = document.createElement('div');
            div.className = 'popup-container';
            div.innerHTML = `<strong>${place.name}</strong>
                             <span class="visit-date">${place.date}</span>`;
            
            if (place.img) {
                const img = document.createElement('img');
                img.src = place.img;
                img.className = 'popup-img';
                div.appendChild(img);
            } else {
                const btn = document.createElement('button');
                btn.className = 'btn btn-photo';
                btn.innerText = '📸 Add Photo';
                btn.onclick = () => { 
                    document.getElementById('file-input').onchange = (e) => uploadPhoto(e, place.id); 
                    document.getElementById('file-input').click(); 
                };
                div.appendChild(btn);
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'btn btn-delete';
            delBtn.innerText = '🗑️ Delete';
            delBtn.onclick = () => deletePlace(place.id);
            div.appendChild(delBtn);

            marker.bindPopup(div);
        }

        function uploadPhoto(event, id) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const index = places.findIndex(p => p.id === id);
                places[index].img = e.target.result;
                save();
                location.reload(); 
            };
            reader.readAsDataURL(file);
        }

        function deletePlace(id) {
            if (confirm("Delete this memory?")) {
                map.removeLayer(activeMarkers[id]);
                places = places.filter(p => p.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('myPlaces', JSON.stringify(places));
            document.getElementById('counter').innerText = `${places.length} places explored`;
        }

        window.onload = () => {
            places.forEach(p => renderMarker(p));
            save();
        };
    </script>
</body>
</html>
